<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Geburtstags Abenteuer</title>

<style>

body{
font-family:Arial;
margin:0;
background:linear-gradient(120deg,#ff9a9e,#fad0c4);
text-align:center;
}

.container{
max-width:750px;
margin:auto;
padding:40px;
}

.card{
background:white;
padding:35px;
border-radius:20px;
box-shadow:0 20px 40px rgba(0,0,0,0.15);
margin-top:25px;
}

h1{
font-size:38px;
}

button{
background:#ff6b6b;
border:none;
padding:14px 24px;
border-radius:10px;
color:white;
font-size:16px;
cursor:pointer;
margin:10px;
}

input{
padding:10px;
width:80%;
margin:8px;
border-radius:8px;
border:1px solid #ddd;
}

table{
width:100%;
margin-top:20px;
border-collapse:collapse;
}

td,th{
padding:10px;
border-bottom:1px solid #ddd;
}

.step{display:none;}
.active{display:block;}

</style>

</head>

<body>

<div class="container">

<h1>🎂 Geburtstags-Abenteuer</h1>

<div class="card step active" id="step1">

<h2>Mission Start</h2>

<p>
Zum Geburtstag schenken wir euch einen gemeinsamen Ausflug.
</p>

<p>
Ihr bestimmt, wohin es geht!
</p>

<button onclick="next()">Mission starten</button>

</div>


<div class="card step" id="step2">

<h2>🌄 Ausflüge entdecken</h2>

<a href="https://suissepartout.ch/de/" target="_blank">
<button>Ausflugideen ansehen</button>
</a>

<br>

<button onclick="next()">Weiter</button>

</div>


<div class="card step" id="step3">

<h2>🏆 Eure Top 3</h2>

<input id="name" placeholder="Name"><br>

<input id="p1" placeholder="🥇 Platz 1"><br>
<input id="p2" placeholder="🥈 Platz 2"><br>
<input id="p3" placeholder="🥉 Platz 3"><br>

<button onclick="vote()">Abstimmen</button>

</div>


<div class="card step" id="step4">

<h2>📊 Live Ranking</h2>

<table id="ranking"></table>

<button onclick="next()">Weiter</button>

</div>


<div class="card step" id="step5">

<h2>📅 Termin abstimmen</h2>

<a href="https://doodle.com">
<button>Doodle öffnen</button>
</a>

<br>

<button onclick="next()">Weiter</button>

</div>


<div class="card step" id="step6">

<h2>🎉 Mission abgeschlossen</h2>

<button onclick="send()">WhatsApp Nachricht senden</button>

</div>

</div>


<script>

let step=1

function next(){

document.getElementById("step"+step).classList.remove("active")

step++

document.getElementById("step"+step).classList.add("active")

}

function vote(){

let name=document.getElementById("name").value
let p1=document.getElementById("p1").value
let p2=document.getElementById("p2").value
let p3=document.getElementById("p3").value

let votes=JSON.parse(localStorage.getItem("votes")||"[]")

votes.push({name,p1,p2,p3})

localStorage.setItem("votes",JSON.stringify(votes))

ranking()

next()

}

function ranking(){

let votes=JSON.parse(localStorage.getItem("votes")||"[]")

let points={}

votes.forEach(v=>{

points[v.p1]=(points[v.p1]||0)+3
points[v.p2]=(points[v.p2]||0)+2
points[v.p3]=(points[v.p3]||0)+1

})

let list=Object.entries(points).sort((a,b)=>b[1]-a[1])

let table="<tr><th>Ausflug</th><th>Punkte</th></tr>"

list.forEach(l=>{

table+="<tr><td>"+l[0]+"</td><td>"+l[1]+"</td></tr>"

})

document.getElementById("ranking").innerHTML=table

}

function send(){

let text="🎉 Wir haben an der Geburtstags-Ausflug Abstimmung teilgenommen!"

window.open("https://wa.me/?text="+encodeURIComponent(text))

}

</script>

</body>
</html>
